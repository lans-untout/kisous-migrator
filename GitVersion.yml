mode: ContinuousDelivery

next-version: 1.0.0

branches:
  main:
    regex: ^main$
    increment: Minor
    label: ''
  feature:
    regex: ^features?[/-]
    increment: Patch
    label: useBranchName
  hotfix:
    regex: ^hotfix(es)?[/-]
    increment: Patch
    label: hotfix
  release:
    regex: ^releases?[/-]
    increment: None
    label: rc

ignore:
  sha: []
