name: Release

on:
  push:
    branches: [ "main" ]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
      
    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          10.0.x
        source-url: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
      env:
        NUGET_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}
        
    - name: Setup GitVersion
      uses: gittools/actions/gitversion/setup@v4.5.0
      with:
        versionSpec: '6.7.x'

    - name: Determine Version
      id: gitversion
      uses: gittools/actions/gitversion/execute@v4.5.0

    - name: Export Version
      run: echo "VERSION=${{ steps.gitversion.outputs.SemVer }}" >> $GITHUB_ENV
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build --no-restore --configuration Release
      
    - name: Test
      run: dotnet test --no-build --configuration Release
      
    - name: Pack
      run: dotnet pack --no-build --configuration Release --output ./nupkgs /p:Version=${{ env.VERSION }}
      
    - name: Push to GitHub Packages
      run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --skip-duplicate

    - name: Create and push release tag
      run: |
        TAG_NAME="v${VERSION}"
        if git rev-parse -q --verify "refs/tags/${TAG_NAME}" >/dev/null; then
          echo "Tag ${TAG_NAME} already exists, skipping."
          exit 0
        fi

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "${TAG_NAME}" -m "Release ${VERSION}"
        git push origin "${TAG_NAME}"

    # Uncomment block below to push to nuget.org as well
    # - name: Push to NuGet.org
    #   run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
